# Cloud Run service spec — declarative alternative to the gcloud CLI walkthrough
# in README.md. Apply with:
#
#   gcloud run services replace mcp_servers/tiger/deploy/cloud-run.yaml \
#     --region=asia-southeast1
#
# Edit `metadata.name` and the secret-resourceVersion references for your project
# before applying. Image is built and pushed separately, then the digest is
# pinned here.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: argus-tiger-mcp
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Allow up to 60 minutes per request — SSE streams stay open.
        run.googleapis.com/cpu-throttling: "false"
        autoscaling.knative.dev/maxScale: "3"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containerConcurrency: 50
      timeoutSeconds: 3600
      containers:
        - image: gcr.io/PROJECT_ID/argus-tiger-mcp:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: MCP_TRANSPORT
              value: sse
            - name: MCP_HOST
              value: 0.0.0.0
            - name: TIGER_LICENSE
              value: TBSG
            - name: TIGER_ENV
              value: PROD
            - name: TIGER_PRIVATE_KEY_PK8
              valueFrom:
                secretKeyRef:
                  name: tiger-private-key-pk8
                  key: latest
            - name: TIGER_ID
              valueFrom:
                secretKeyRef:
                  name: tiger-id
                  key: latest
            - name: TIGER_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: tiger-account
                  key: latest
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-bearer-token
                  key: latest
            - name: MCP_BASE_URL
              # Cloud Run injects the public URL via K_SERVICE / K_REVISION;
              # set this after first deploy with --update-env-vars.
              value: https://argus-tiger-mcp-PROJECT_HASH-as.a.run.app
