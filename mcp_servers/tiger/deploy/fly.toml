# Fly.io app config for the Tiger MCP server.
#
# Region picked for proximity to Tiger Open API (Singapore for the TBSG license).
# Change `app =` to a name you own before first `fly launch` / `fly deploy`.

app = "argus-tiger-mcp"
primary_region = "sin"

[build]
  dockerfile = "mcp_servers/tiger/deploy/Dockerfile"

[env]
  # Non-secret defaults. Tiger credentials + MCP_BEARER_TOKEN are set via
  # `fly secrets set`, never committed.
  MCP_TRANSPORT = "sse"
  MCP_HOST = "0.0.0.0"
  MCP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on: stop machines on idle is OFF so the first call after a quiet
  # hour doesn't pay a cold-start. With a single shared-cpu-1x@256MB machine
  # always running, the workload sits well inside the Fly hobby allowance.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
