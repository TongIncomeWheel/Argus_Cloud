name: Keep ARGUS warm

# Pings the Streamlit Cloud app URL every 10 minutes so it never crosses
# the free-tier inactivity threshold (which kicks in after roughly 7 days
# of zero traffic). HTTP requests count as activity — no WebSocket or
# user click required.
#
# Setup (one-time):
#   1. Open your Streamlit Cloud app, copy its URL (e.g.
#      https://your-app.streamlit.app)
#   2. In this GitHub repo: Settings → Secrets and variables → Actions →
#      New repository secret. Name: STREAMLIT_APP_URL. Value: the URL.
#   3. (Optional) Trigger this workflow once manually from the Actions
#      tab to confirm the ping works.
#
# Notes:
#   - GitHub Actions cron is best-effort and can be delayed by a few
#     minutes during platform load. A 10-minute interval has plenty of
#     margin for the 7-day inactivity threshold.
#   - Scheduled workflows get auto-disabled after 60 days of repo
#     inactivity. As long as someone commits to this repo at least once
#     every two months, this keeps running forever.
#   - We deliberately don't fail the job on non-200 responses — Streamlit
#     Cloud can momentarily return 5xx during a restart, and we don't
#     want a noisy failure email for transient blips.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Avoid stacking up runs if a ping hangs.
concurrency:
  group: keep-warm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping ARGUS
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -u
          if [ -z "$APP_URL" ]; then
            echo "::error::STREAMLIT_APP_URL secret is not set on this repo."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          base="${APP_URL%/}"
          echo "→ Pinging $base/"

          # HEAD request, capped redirects. Why we don't care about the
          # actual HTTP code:
          #   - 200 → app responded normally
          #   - 3xx → Streamlit Cloud is redirecting (login flow on private
          #     apps, custom-domain routing, etc.) — the LB still saw us
          #   - 4xx/5xx → app is up but in a weird state — the LB still saw us
          # Any of those resets the free-tier inactivity timer. The only
          # outcome we actually care to catch is "curl couldn't reach the
          # host" (DNS failure, network timeout, redirect-loop blowout),
          # which we treat as a non-fatal warning.
          http_code=$(curl -sS -I --max-time 30 --max-redirs 5 -L \
                          -o /dev/null -w "%{http_code}" "$base/" 2>/dev/null \
                      || echo "error")

          echo "   HTTP $http_code"
          if [ "$http_code" = "error" ] || [ "$http_code" = "000" ]; then
            echo "::warning::Couldn't reach Streamlit Cloud (DNS, timeout, or redirect loop). Will retry next tick."
          else
            echo "✅ Streamlit Cloud responded — keep-alive ping registered."
          fi
          # Always exit 0 — we never want a noisy failure email for transient
          # platform blips during a Streamlit restart.
          exit 0
