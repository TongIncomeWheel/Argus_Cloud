name: Deploy Tiger MCP to Cloud Run

# Auto-deploys mcp_servers/tiger to Cloud Run whenever the relevant code
# changes on main. The workflow lives next to the keep-alive cron so the
# repo has a single .github/workflows/ home for all CI.
#
# REQUIRED REPO SECRETS (one-time setup at github.com/<repo>/settings/secrets):
#   GCP_SERVICE_ACCOUNT_KEY   JSON key for a service account in tiger-mcp-499603
#                             with: roles/run.admin, roles/cloudbuild.builds.editor,
#                             roles/artifactregistry.writer, roles/storage.admin,
#                             roles/iam.serviceAccountUser, roles/secretmanager.viewer
#                             (or just roles/owner for the simplest setup)
#
# The runtime *application* service account (compute SA) keeps its own
# Secret Manager Accessor bindings for TIGER_*; this workflow only needs
# permission to push images and update the Cloud Run service.

on:
  push:
    branches: [main]
    paths:
      - 'mcp_servers/**'
      - 'tiger_api/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-mcp.yml'
  # Manual trigger from the Actions tab — useful for re-deploying without
  # a code change (e.g. after rotating a secret).
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you redeploying?'
        required: false
        default: 'manual redeploy'

# Cancel any in-flight deploy if a newer push lands on main while it runs.
concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # reserved for future Workload Identity Federation upgrade

env:
  GCP_PROJECT: tiger-mcp-499603
  GCP_REGION: asia-southeast1
  SERVICE: argus-tiger-mcp
  SERVICE_URL: https://argus-tiger-mcp-686093261470.asia-southeast1.run.app

jobs:
  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Verify gcloud + project
        run: |
          gcloud --version | head -2
          gcloud config get-value project

      # Idempotent one-time setup for persistent OAuth state. Enables
      # the Firestore API, creates a Native-mode database in the same
      # region as Cloud Run, and grants the runtime compute SA read+write.
      # All commands swallow "already exists" / "already enabled" so
      # re-runs are no-ops.
      - name: Ensure Firestore is provisioned
        env:
          PROJECT_NUMBER: "686093261470"
        run: |
          set +e
          echo "→ enable firestore API"
          gcloud services enable firestore.googleapis.com --project "$GCP_PROJECT"
          echo "→ create (default) Firestore database in $GCP_REGION (no-op if exists)"
          gcloud firestore databases create \
            --location="$GCP_REGION" \
            --type=firestore-native \
            --project "$GCP_PROJECT" 2>&1 | grep -v 'ALREADY_EXISTS\|already exists' || true
          echo "→ grant runtime SA Datastore User"
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud projects add-iam-policy-binding "$GCP_PROJECT" \
            --member="serviceAccount:${RUN_SA}" \
            --role="roles/datastore.user" \
            --condition=None \
            --quiet > /dev/null
          echo "✓ Firestore ready"

      # gcloud run deploy --source . wants the Dockerfile at the source
      # root, not nested under mcp_servers/tiger/deploy/. Mirror it for
      # the duration of this job — the copy is local to the runner and
      # is discarded when the job ends.
      - name: Stage Dockerfile at source root
        run: cp mcp_servers/tiger/deploy/Dockerfile ./Dockerfile

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 50 \
            --timeout 3600 \
            --no-cpu-throttling \
            --set-env-vars MCP_TRANSPORT=sse,MCP_HOST=0.0.0.0,TIGER_LICENSE=TBSG,TIGER_ENV=PROD,MCP_BASE_URL=${SERVICE_URL},MCP_OAUTH_STORAGE=firestore,GCP_PROJECT=${GCP_PROJECT} \
            --set-secrets TIGER_PRIVATE_KEY_PK8=tiger-private-key-pk8:latest,TIGER_ID=tiger-id:latest,TIGER_ACCOUNT=tiger-account:latest,MCP_BEARER_TOKEN=mcp-bearer-token:latest,MCP_OAUTH_OWNER_PASSWORD=mcp-oauth-owner-password:latest \
            --quiet

      - name: Post-deploy sanity checks
        run: |
          set -e
          echo "→ OAuth metadata reachable?"
          curl -fsS "$SERVICE_URL/.well-known/oauth-authorization-server" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(' ', d['issuer']); print(' ', 'endpoints:', sorted(k for k in d if k.endswith('_endpoint')))"
          echo
          echo "→ /sse without bearer expects HTTP 401"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SERVICE_URL/sse")
          echo "  got HTTP $code"
          if [ "$code" != "401" ]; then
            echo "::warning::Expected 401 on unauth /sse, got $code"
          fi
          echo
          echo "✅ deployed: $SERVICE_URL"
