name: Deploy Tiger MCP to Cloud Run

# Auto-deploys mcp_servers/tiger to Cloud Run whenever the relevant code
# changes on main. The workflow lives next to the keep-alive cron so the
# repo has a single .github/workflows/ home for all CI.
#
# REQUIRED REPO SECRETS (one-time setup at github.com/<repo>/settings/secrets):
#   GCP_SERVICE_ACCOUNT_KEY   JSON key for a service account in tiger-mcp-499603
#                             with: roles/run.admin, roles/cloudbuild.builds.editor,
#                             roles/artifactregistry.writer, roles/storage.admin,
#                             roles/iam.serviceAccountUser, roles/secretmanager.viewer
#                             (or just roles/owner for the simplest setup)
#
# The runtime *application* service account (compute SA) keeps its own
# Secret Manager Accessor bindings for TIGER_*; this workflow only needs
# permission to push images and update the Cloud Run service.

on:
  push:
    branches: [main]
    paths:
      - 'mcp_servers/**'
      - 'tiger_api/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-mcp.yml'
  # Manual trigger from the Actions tab — useful for re-deploying without
  # a code change (e.g. after rotating a secret).
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you redeploying?'
        required: false
        default: 'manual redeploy'

# Cancel any in-flight deploy if a newer push lands on main while it runs.
concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # reserved for future Workload Identity Federation upgrade

env:
  GCP_PROJECT: tiger-mcp-499603
  GCP_REGION: asia-southeast1
  SERVICE: argus-tiger-mcp
  SERVICE_URL: https://argus-tiger-mcp-686093261470.asia-southeast1.run.app

jobs:
  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Verify gcloud + project
        run: |
          gcloud --version | head -2
          gcloud config get-value project

      # Idempotent one-time setup for persistent OAuth state. Enables
      # the Firestore API, creates a Native-mode database in the same
      # region as Cloud Run, and grants the runtime compute SA read+write.
      # All commands swallow "already exists" / "already enabled" so
      # re-runs are no-ops.
      - name: Ensure Firestore is provisioned
        env:
          PROJECT_NUMBER: "686093261470"
        run: |
          set +e
          echo "→ enable firestore API"
          gcloud services enable firestore.googleapis.com --project "$GCP_PROJECT"
          echo "→ create (default) Firestore database in $GCP_REGION (no-op if exists)"
          gcloud firestore databases create \
            --location="$GCP_REGION" \
            --type=firestore-native \
            --project "$GCP_PROJECT" 2>&1 | grep -v 'ALREADY_EXISTS\|already exists' || true
          echo "→ grant runtime SA Datastore User"
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud projects add-iam-policy-binding "$GCP_PROJECT" \
            --member="serviceAccount:${RUN_SA}" \
            --role="roles/datastore.user" \
            --condition=None \
            --quiet > /dev/null
          echo "✓ Firestore ready"

      # Ensure the static OAuth client_secret exists in Secret Manager.
      # If missing, generate a random 48-char URL-safe token and store
      # it. Grant the runtime compute SA accessor on it. Subsequent runs
      # are no-ops. The client_id itself is a fixed string in env vars
      # (not secret — just a public identifier for claude.ai's form).
      - name: Ensure static OAuth client secret exists
        env:
          PROJECT_NUMBER: "686093261470"
        run: |
          set +e
          SECRET_NAME="mcp-oauth-client-secret"
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          if gcloud secrets describe "$SECRET_NAME" --project "$GCP_PROJECT" >/dev/null 2>&1; then
            echo "→ secret $SECRET_NAME already exists"
          else
            echo "→ creating $SECRET_NAME with random 48-char value"
            python3 -c "import secrets; print(secrets.token_urlsafe(48), end='')" \
              | gcloud secrets create "$SECRET_NAME" \
                  --data-file=- \
                  --replication-policy=automatic \
                  --project "$GCP_PROJECT" --quiet
          fi
          echo "→ grant runtime SA Secret Accessor on $SECRET_NAME"
          gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
            --member="serviceAccount:${RUN_SA}" \
            --role="roles/secretmanager.secretAccessor" \
            --project="$GCP_PROJECT" \
            --quiet > /dev/null
          echo "✓ Static OAuth client secret ready"

      # Sync the Income Wheel spreadsheet ID + GSheets service account JSON
      # from GitHub repo secrets into Secret Manager on every deploy.
      # The same secrets are also used by quarterly-archive.yml — single
      # source of truth, no separate provisioning step.
      #
      # Behaviour:
      #   - If the GH secret is set → push its value to Secret Manager
      #     (overwrites prior versions).
      #   - If the GH secret is NOT set → leave any existing Secret
      #     Manager version in place; only seed a NOT_SET sentinel if
      #     the secret has no versions yet so the deploy doesn't fail.
      #
      # Either path leaves a valid :latest version, which Cloud Run binds
      # below. data_table.py treats NOT_SET / empty as unconfigured and
      # falls back to the Tiger 90-day fill window.
      - name: Sync GSheets credentials and Sheet ID into Secret Manager
        env:
          PROJECT_NUMBER: "686093261470"
          GH_SHEET_ID: ${{ secrets.INCOME_WHEEL_SHEET_ID }}
          GH_GSHEET_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          set +e
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          echo "→ enable Sheets + Drive APIs (no-op if already enabled)"
          gcloud services enable sheets.googleapis.com drive.googleapis.com \
            --project "$GCP_PROJECT" --quiet > /dev/null

          # ── helper: ensure a secret exists, then write a version ──────
          # $1 = secret name, $2 = stdin payload (already-validated, non-empty)
          push_secret_version () {
            local name="$1"
            local payload="$2"
            if gcloud secrets describe "$name" --project "$GCP_PROJECT" >/dev/null 2>&1; then
              printf '%s' "$payload" | gcloud secrets versions add "$name" \
                --data-file=- --project "$GCP_PROJECT" --quiet
            else
              printf '%s' "$payload" | gcloud secrets create "$name" \
                --data-file=- --replication-policy=automatic \
                --project "$GCP_PROJECT" --quiet
            fi
            gcloud secrets add-iam-policy-binding "$name" \
              --member="serviceAccount:${RUN_SA}" \
              --role="roles/secretmanager.secretAccessor" \
              --project="$GCP_PROJECT" --quiet > /dev/null
          }

          # ── INCOME_WHEEL_SHEET_ID ────────────────────────────────────
          SHEET_SECRET="mcp-income-wheel-sheet-id"
          if [ -n "$GH_SHEET_ID" ]; then
            echo "→ syncing INCOME_WHEEL_SHEET_ID GH secret → $SHEET_SECRET"
            push_secret_version "$SHEET_SECRET" "$GH_SHEET_ID"
            echo "  ✓ Sheet ID synced from GH secret"
          else
            echo "::warning::INCOME_WHEEL_SHEET_ID GH secret not set — "\
              "get_position_roc will use Tiger 90-day fallback."
            # Only seed a sentinel if the secret has no versions; never overwrite a real value.
            if gcloud secrets describe "$SHEET_SECRET" --project "$GCP_PROJECT" >/dev/null 2>&1; then
              if ! gcloud secrets versions list "$SHEET_SECRET" --project "$GCP_PROJECT" --limit 1 --format='value(name)' | grep -q .; then
                push_secret_version "$SHEET_SECRET" "NOT_SET"
              else
                echo "  → existing secret preserved (set previously)"
              fi
            else
              push_secret_version "$SHEET_SECRET" "NOT_SET"
            fi
          fi

          # ── GOOGLE_SHEETS_CREDENTIALS (SA JSON) ───────────────────────
          CREDS_SECRET="mcp-gsheet-credentials-json"
          if [ -n "$GH_GSHEET_CREDS" ]; then
            echo "→ validating GOOGLE_SHEETS_CREDENTIALS JSON"
            if ! printf '%s' "$GH_GSHEET_CREDS" | python3 -c "import sys, json; json.load(sys.stdin)" 2>/dev/null; then
              echo "::error::GOOGLE_SHEETS_CREDENTIALS GH secret is not valid JSON"
              exit 1
            fi
            echo "→ syncing GOOGLE_SHEETS_CREDENTIALS GH secret → $CREDS_SECRET"
            push_secret_version "$CREDS_SECRET" "$GH_GSHEET_CREDS"
            echo "  ✓ GSheet SA credentials synced from GH secret"
          else
            echo "::warning::GOOGLE_SHEETS_CREDENTIALS GH secret not set — "\
              "MCP will try ADC (Cloud Run runtime SA), then fall through to Tiger fallback."
            if gcloud secrets describe "$CREDS_SECRET" --project "$GCP_PROJECT" >/dev/null 2>&1; then
              if ! gcloud secrets versions list "$CREDS_SECRET" --project "$GCP_PROJECT" --limit 1 --format='value(name)' | grep -q .; then
                push_secret_version "$CREDS_SECRET" "NOT_SET"
              else
                echo "  → existing secret preserved (set previously)"
              fi
            else
              push_secret_version "$CREDS_SECRET" "NOT_SET"
            fi
          fi
          echo "✓ Sheet ID + GSheet credentials provisioned"

      # gcloud run deploy --source . wants the Dockerfile at the source
      # root, not nested under mcp_servers/tiger/deploy/. Mirror it for
      # the duration of this job — the copy is local to the runner and
      # is discarded when the job ends.
      - name: Stage Dockerfile at source root
        run: cp mcp_servers/tiger/deploy/Dockerfile ./Dockerfile

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --concurrency 50 \
            --timeout 3600 \
            --no-cpu-throttling \
            --set-env-vars MCP_TRANSPORT=streamable-http,MCP_HOST=0.0.0.0,TIGER_LICENSE=TBSG,TIGER_ENV=PROD,MCP_BASE_URL=${SERVICE_URL},MCP_OAUTH_STORAGE=firestore,GCP_PROJECT=${GCP_PROJECT},MCP_OAUTH_CLIENT_ID=argus-tiger-mcp-claude \
            --set-secrets TIGER_PRIVATE_KEY_PK8=tiger-private-key-pk8:latest,TIGER_ID=tiger-id:latest,TIGER_ACCOUNT=tiger-account:latest,MCP_BEARER_TOKEN=mcp-bearer-token:latest,MCP_OAUTH_OWNER_PASSWORD=mcp-oauth-owner-password:latest,MCP_OAUTH_CLIENT_SECRET=mcp-oauth-client-secret:latest,MCP_INCOME_WHEEL_SHEET_ID=mcp-income-wheel-sheet-id:latest,MCP_GSHEET_CREDENTIALS_JSON=mcp-gsheet-credentials-json:latest \
            --quiet

      - name: Post-deploy sanity checks
        run: |
          set -e
          echo "→ OAuth metadata reachable?"
          curl -fsS "$SERVICE_URL/.well-known/oauth-authorization-server" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(' ', d['issuer']); print(' ', 'endpoints:', sorted(k for k in d if k.endswith('_endpoint')))"
          echo
          echo "→ /mcp without bearer expects HTTP 401"
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SERVICE_URL/mcp")
          echo "  got HTTP $code"
          if [ "$code" != "401" ]; then
            echo "::warning::Expected 401 on unauth /mcp, got $code"
          fi
          echo
          echo "✅ deployed: $SERVICE_URL"

      # Print the connector configuration values so the user has them
      # available for claude.ai's "Add custom connector" form. Repo logs
      # are only visible to collaborators (single user), so this is an
      # acceptable trade-off vs forcing the user to navigate Secret
      # Manager UI on every connector re-add.
      - name: Print claude.ai connector setup values
        run: |
          set -e
          echo "=========================================="
          echo "CLAUDE.AI CUSTOM CONNECTOR SETUP VALUES"
          echo "Use these in claude.ai/settings/connectors → Add custom connector"
          echo "=========================================="
          echo
          echo "  URL:              $SERVICE_URL/mcp"
          echo "  (streamable-http transport; replaces the older /sse endpoint)"
          echo "  OAuth Client ID:  argus-tiger-mcp-claude"
          printf "  OAuth Client Secret: "
          gcloud secrets versions access latest \
            --secret=mcp-oauth-client-secret \
            --project="$GCP_PROJECT"
          echo
          echo
          echo "  Owner Password (consent page): "
          gcloud secrets versions access latest \
            --secret=mcp-oauth-owner-password \
            --project="$GCP_PROJECT"
          echo
          echo "=========================================="
